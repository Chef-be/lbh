# Configuration Redis — Plateforme BEE
# Fichier minimal pour bee-redis

# Activer la persistance AOF
appendonly yes
appendfilename "redis-aof.aof"
appendfsync everysec

# Limite mémoire (peut être surchargée par la commande Docker)
maxmemory 512mb
maxmemory-policy allkeys-lru

# Sauvegardes RDB (snapshot)
save 900 1
save 300 10
save 60 1000

# Journalisation
loglevel notice

# Désactiver les commandes dangereuses en production
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command CONFIG ""
