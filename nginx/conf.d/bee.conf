# ============================================================
# Configuration Nginx — Plateforme BEE
# Proxy interne unique vers l'interface et l'API
# ============================================================
# Ce fichier est utilisé à l'intérieur du conteneur bee-nginx.
# Plesk gère le certificat SSL et le proxy externe (80/443).
# Ce proxy interne écoute sur le port 80 du conteneur.
# Le port 127.0.0.1:3082 est exposé vers Plesk.
# ============================================================

upstream bee_frontend {
    server bee-frontend:3000;
    keepalive 32;
}

upstream bee_backend {
    server bee-backend:8000;
    keepalive 32;
}

upstream bee_services {
    server bee-services:8001;
    keepalive 32;
}

# Taille maximale des imports (doit correspondre à SYS_TAILLE_MAX_IMPORT)
client_max_body_size 100m;

# Délais pour les traitements longs (OCR, analyse, génération)
proxy_read_timeout 300s;
proxy_connect_timeout 60s;
proxy_send_timeout 300s;

server {
    listen 80;
    server_name _;

    # En-têtes de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Journalisation
    access_log /var/log/app/nginx/acces.log;
    error_log /var/log/app/nginx/erreurs.log warn;

    # --------------------------------------------------------
    # API Django — routes /api/
    # --------------------------------------------------------
    location /api/ {
        proxy_pass http://bee_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # --------------------------------------------------------
    # Administration Django — /admin-bee/
    # (accessible uniquement depuis Plesk ou IP de confiance)
    # --------------------------------------------------------
    location /admin-bee/ {
        # Restreindre aux IP de confiance en production
        # allow 127.0.0.1;
        # deny all;
        proxy_pass http://bee_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------
    # Services spécialisés FastAPI — /services/
    # --------------------------------------------------------
    location /services/ {
        proxy_pass http://bee_services/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # --------------------------------------------------------
    # Fichiers statiques Django — /statiques/
    # --------------------------------------------------------
    location /statiques/ {
        alias /var/www/statiques/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --------------------------------------------------------
    # Médias Django — /medias/
    # --------------------------------------------------------
    location /medias/ {
        alias /var/www/medias/;
        expires 7d;
        add_header Cache-Control "private";
        # Vérification des droits via @acces_media (voir ci-dessous)
        # En production, utiliser X-Accel-Redirect depuis Django
    }

    # --------------------------------------------------------
    # Interface Next.js — tout le reste
    # --------------------------------------------------------
    location / {
        proxy_pass http://bee_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Hot reload Next.js (développement uniquement)
    }

    # --------------------------------------------------------
    # Vérification de santé du proxy
    # --------------------------------------------------------
    location /sante-proxy {
        access_log off;
        return 200 "bee-nginx opérationnel\n";
        add_header Content-Type text/plain;
    }
}
