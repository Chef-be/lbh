# ============================================================
# compose.yaml — LBH ECONOMISTE
# Généré automatiquement par l'installateur
# Date : 2026-03-28T12:02:46.346996
# Préfixe conteneurs : bee
# ============================================================
# NE PAS MODIFIER MANUELLEMENT — Regénérer via l'installateur
# ou modifier le gabarit : installateur/gabarits/compose/compose.yaml.j2
# ============================================================

name: bee

# ------------------------------------------------------------
# VOLUMES PERSISTANTS
# ------------------------------------------------------------
volumes:
  bee-donnees-postgresql:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/bee/postgresql

  bee-donnees-redis:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/bee/redis

  bee-donnees-minio:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/bee/minio

  bee-journaux:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/bee/journaux

  bee-medias:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/bee/medias

  bee-statiques:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/www/vhosts/lbh-economiste.com/httpdocs/volumes/bee/statiques

# ------------------------------------------------------------
# RÉSEAU DÉDIÉ
# ------------------------------------------------------------
networks:
  bee-reseau:
    driver: bridge
    name: bee-reseau

# ============================================================
# SERVICES
# ============================================================
services:

  # ----------------------------------------------------------
  # PROXY — Point d'entrée Plesk (port 3082)
  # ----------------------------------------------------------
  bee-nginx:
    image: nginx:1.27-alpine
    container_name: bee-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT_ENTREE_PLESK}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - bee-statiques:/var/www/statiques:ro
      - bee-medias:/var/www/medias:ro
      - bee-journaux:/var/log/app/nginx:rw
    depends_on:
      bee-frontend:
        condition: service_healthy
      bee-backend:
        condition: service_healthy
    networks:
      - bee-reseau
    environment:
      - TZ=${FUSEAU_HORAIRE}
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # INTERFACE — Next.js
  # ----------------------------------------------------------
  bee-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${ENVIRONNEMENT}
    container_name: bee-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=${ENVIRONNEMENT}
      - TZ=${FUSEAU_HORAIRE}
      - NEXTAUTH_SECRET=${SECRET_NEXTAUTH}
      - NEXTAUTH_URL=${URL_BASE}
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_NOM_PLATEFORME=${NOM_PLATEFORME}
      - NEXT_PUBLIC_PREFIXE=${PREFIXE_CONTENEURS}
      - HOSTNAME=0.0.0.0
    depends_on:
      bee-backend:
        condition: service_healthy
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/sante"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # CŒUR APPLICATIF — Django
  # ----------------------------------------------------------
  bee-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bee-backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - ./backend:/app:rw
      - bee-medias:/app/medias:rw
      - bee-statiques:/app/statiques:rw
      - bee-journaux:/var/log/app/backend:rw
      - /var/www/vhosts/lbh-economiste.com/ressources:/ressources:ro
    environment:
      - DJANGO_SETTINGS_MODULE=configuration.parametres.${ENVIRONNEMENT}
      - SECRET_DJANGO=${SECRET_DJANGO}
      - NOM_PLATEFORME=${NOM_PLATEFORME}
      - PREFIXE_CONTENEURS=${PREFIXE_CONTENEURS}
      - BDD_HOTE=${BDD_HOTE}
      - BDD_PORT=${BDD_PORT}
      - BDD_NOM=${BDD_NOM}
      - BDD_UTILISATEUR=${BDD_UTILISATEUR}
      - BDD_MOT_DE_PASSE=${BDD_MOT_DE_PASSE}
      - REDIS_HOTE=${REDIS_HOTE}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_MOT_DE_PASSE=${REDIS_MOT_DE_PASSE}
      - URL_REDIS=${URL_REDIS}
      - CELERY_COURTIER=${CELERY_COURTIER}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
      - MINIO_SSL=${MINIO_SSL}
      - COURRIEL_HOTE_SMTP=${COURRIEL_HOTE_SMTP}
      - COURRIEL_PORT_SMTP=${COURRIEL_PORT_SMTP}
      - COURRIEL_TLS=${COURRIEL_TLS}
      - COURRIEL_SSL=${COURRIEL_SSL}
      - COURRIEL_UTILISATEUR=${COURRIEL_UTILISATEUR}
      - COURRIEL_MOT_DE_PASSE=${COURRIEL_MOT_DE_PASSE}
      - TZ=${FUSEAU_HORAIRE}
      - DEBUG=${DEBUG}
      - URL_BASE=${URL_BASE}
      - DOMAINES_AUTORISES=${DOMAINES_AUTORISES}
    depends_on:
      bee-postgresql:
        condition: service_healthy
      bee-redis:
        condition: service_healthy
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/sante/"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # SERVICES FASTAPI
  # ----------------------------------------------------------
  bee-services:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: bee-services
    restart: unless-stopped
    expose:
      - "8001"
    volumes:
      - ./services:/app:rw
      - bee-medias:/app/medias:rw
      - bee-journaux:/var/log/app/services:rw
    environment:
      - TZ=${FUSEAU_HORAIRE}
      - BDD_URL=${DATABASE_URL}
      - REDIS_URL=${URL_REDIS}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
      - SECRET_API=${SECRET_DJANGO}
    depends_on:
      bee-postgresql:
        condition: service_healthy
      bee-redis:
        condition: service_healthy
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # BASE DE DONNÉES — PostgreSQL + PostGIS
  # ----------------------------------------------------------
  bee-postgresql:
    image: postgis/postgis:16-3.4
    container_name: bee-postgresql
    restart: unless-stopped
    expose:
      - "5432"
    ports:
      - "127.0.0.1:${PORT_POSTGRESQL_LOCAL}:5432"
    volumes:
      - bee-donnees-postgresql:/var/lib/postgresql/data:rw
      - ./scripts/installation/init-postgresql.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    environment:
      - POSTGRES_DB=${BDD_NOM}
      - POSTGRES_USER=${BDD_UTILISATEUR}
      - POSTGRES_PASSWORD=${BDD_MOT_DE_PASSE}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - TZ=${FUSEAU_HORAIRE}
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BDD_UTILISATEUR} -d ${BDD_NOM}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # CACHE ET FILE D'ATTENTE — Redis
  # ----------------------------------------------------------
  bee-redis:
    image: redis:7-alpine
    container_name: bee-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - bee-donnees-redis:/data:rw
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    environment:
      - TZ=${FUSEAU_HORAIRE}
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # STOCKAGE OBJET — MinIO
  # ----------------------------------------------------------
  bee-minio:
    image: minio/minio:latest
    container_name: bee-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${PORT_MINIO_API}:9000"
      - "127.0.0.1:${PORT_MINIO_CONSOLE}:9001"
    volumes:
      - bee-donnees-minio:/data:rw
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCES_CLE}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_CLE}
      - TZ=${FUSEAU_HORAIRE}
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # TRAITEMENT ASYNCHRONE — Celery Worker
  # ----------------------------------------------------------
  bee-celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bee-celery
    restart: unless-stopped
    command: celery -A configuration worker --loglevel=info --concurrency=4 -Q principale,documents,calculs,courriels
    volumes:
      - ./backend:/app:rw
      - bee-medias:/app/medias:rw
      - bee-journaux:/var/log/app/celery:rw
      - /var/www/vhosts/lbh-economiste.com/ressources:/ressources:ro
    environment:
      - DJANGO_SETTINGS_MODULE=configuration.parametres.${ENVIRONNEMENT}
      - SECRET_DJANGO=${SECRET_DJANGO}
      - CELERY_COURTIER=${CELERY_COURTIER}
      - CELERY_RESULTATS=${CELERY_RESULTATS}
      - URL_REDIS=${URL_REDIS}
      - REDIS_HOTE=${REDIS_HOTE}
      - REDIS_PORT=${REDIS_PORT}
      - BDD_HOTE=${BDD_HOTE}
      - BDD_PORT=${BDD_PORT}
      - BDD_NOM=${BDD_NOM}
      - BDD_UTILISATEUR=${BDD_UTILISATEUR}
      - BDD_MOT_DE_PASSE=${BDD_MOT_DE_PASSE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
      - TZ=${FUSEAU_HORAIRE}
    depends_on:
      bee-redis:
        condition: service_healthy
      bee-postgresql:
        condition: service_healthy
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "celery", "-A", "configuration", "inspect", "ping", "--timeout=10"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ----------------------------------------------------------
  # ORDONNANCEUR — Celery Beat
  # ----------------------------------------------------------
  bee-celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bee-celery-beat
    restart: unless-stopped
    command: celery -A configuration beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app:rw
      - bee-journaux:/var/log/app/celery-beat:rw
    environment:
      - DJANGO_SETTINGS_MODULE=configuration.parametres.${ENVIRONNEMENT}
      - SECRET_DJANGO=${SECRET_DJANGO}
      - CELERY_COURTIER=${CELERY_COURTIER}
      - URL_REDIS=${URL_REDIS}
      - REDIS_HOTE=${REDIS_HOTE}
      - REDIS_PORT=${REDIS_PORT}
      - BDD_HOTE=${BDD_HOTE}
      - BDD_PORT=${BDD_PORT}
      - BDD_NOM=${BDD_NOM}
      - BDD_UTILISATEUR=${BDD_UTILISATEUR}
      - BDD_MOT_DE_PASSE=${BDD_MOT_DE_PASSE}
      - TZ=${FUSEAU_HORAIRE}
    depends_on:
      bee-redis:
        condition: service_healthy
      bee-postgresql:
        condition: service_healthy
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "python", "-c", "import celery; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # OCR — Tesseract 5 + Python
  # ----------------------------------------------------------
  bee-ocr:
    build:
      context: ./services/ocr
      dockerfile: Dockerfile
    container_name: bee-ocr
    restart: unless-stopped
    expose:
      - "8010"
    volumes:
      - ./services/ocr:/app:rw
      - bee-journaux:/var/log/app/ocr:rw
    environment:
      - TZ=${FUSEAU_HORAIRE}
      - OCR_LANGUES=${OCR_LANGUES}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
    depends_on:
      bee-minio:
        condition: service_healthy
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # ANALYSE PDF
  # ----------------------------------------------------------
  bee-analyse-pdf:
    build:
      context: ./services/analyse-pdf
      dockerfile: Dockerfile
    container_name: bee-analyse-pdf
    restart: unless-stopped
    expose:
      - "8011"
    volumes:
      - ./services/analyse-pdf:/app:rw
      - bee-journaux:/var/log/app/analyse-pdf:rw
    environment:
      - TZ=${FUSEAU_HORAIRE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
    depends_on:
      bee-minio:
        condition: service_healthy
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ----------------------------------------------------------
  # ANALYSE CAO — DXF/DWG
  # ----------------------------------------------------------
  bee-analyse-cao:
    build:
      context: ./services/analyse-cao
      dockerfile: Dockerfile
    container_name: bee-analyse-cao
    restart: unless-stopped
    expose:
      - "8012"
    volumes:
      - ./services/analyse-cao:/app:rw
      - bee-journaux:/var/log/app/analyse-cao:rw
    environment:
      - TZ=${FUSEAU_HORAIRE}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_ACCES_CLE=${MINIO_ACCES_CLE}
      - MINIO_SECRET_CLE=${MINIO_SECRET_CLE}
    depends_on:
      bee-minio:
        condition: service_healthy
    networks:
      - bee-reseau
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/sante"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"